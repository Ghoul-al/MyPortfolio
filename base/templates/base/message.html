{% extends 'base/main.html' %}
{% load static %}
{% block content %}

<div class="container">
    <div class="section-heading">
        <h3>Message</h3>
    </div>

    <div class="card">
        <div class="card-body">
            <p><strong>Name:</strong> {{message.name}}</p>
            <p><strong>Email:</strong> {{message.email}}</p>
            <hr>
            <p>{{message.body}}</p>
        </div>
    </div>
</div>

{% endblock content %}
