{% extends 'base/main.html' %}
{% load static %}
{% block content %}

<div class="container">
    <div class="section-heading">
        <h3>Support My Work</h3>
        <span>Buy me a coffee to keep the projects coming</span>
    </div>

    <div class="donation--wrapper">
        <div class="card">
            <div class="card-body">
                <h3>Buy me a coffee :)</h3>
                <p>Would you consider donating $5?</p>
                <div id="paypal-button-container"></div>
            </div>
        </div>
    </div>
</div>

<script
    src="https://www.paypal.com/sdk/js?client-id=AX0qjjg67aS_hOcJEV6nRfyU-PFQIJYx6FcbgPO3QgYX2g40qXGPvO81356aG9jxOu0g4FSpsC2f8AYW&currency=USD"></script>
<script>
    paypal.Buttons({
        style: {
            color: 'blue',
            shape: 'rect',
            label: 'pay',
            height: 40
        },
        createOrder: function (data, actions) {
            return actions.order.create({
                purchase_units: [{
                    amount: {
                        value: '5.00'
                    }
                }]
            });
        },
        onApprove: function (data, actions) {
            return actions.order.capture().then(function (details) {
                alert('Transaction completed by ' + details.payer.name.given_name + '!');
            });
        }
    }).render('#paypal-button-container');
</script>

<style>
    .donation--wrapper {
        max-width: 400px;
        margin: 0 auto;
    }
</style>

{% endblock content %}
