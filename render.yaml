services:
  - type: web
    name: MyPortfolio
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn portfoliowebsite.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: portfoliowebsite.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        fromService:
          type: web
          name: MyPortfolio
          property: host
      # Set DATABASE_URL manually in Render dashboard
      - key: DATABASE_URL
        sync: false

